<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anniversary Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url('https://i.ibb.co/7Q5q6Q5/flowers-love-bg.jpg');
            background-size: cover;
            background-position: center;
            font-family: 'Pacifico', cursive;
            color: #ff2d95;
            margin: 0;
            overflow-x: hidden;
        }
        body::before {
            content: "💖🌸💐💌";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-around;
            font-size: 3em;
            animation: float 5s infinite alternate;
            pointer-events: none;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(30px); }
        }
        .page {
            display: none;
            text-align: center;
            padding: 50px;
            font-size: 2em;
        }
        .page.active {
            display: block;
        }
        .next-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #ff4da6;
            color: white;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 9999;
            transition: transform 0.2s, background-color 0.3s;
        }
        .next-button:hover {
            transform: scale(1.1);
            background-color: #ff66b2;
        }
    </style>
</head>
<body>
    <audio id="bgMusic" src="Umraan Lameriyan - Juss.mp3" loop autoplay></audio>

    <div class="page active">
        <h1>Happy Anniversary Mera Bachaa 💕❤️</h1>
    </div>
    <div class="page">
        <h2>2 March, 10 PM PDF... Kuch yaad aaya darling 🥹</h2>
    </div>
    <div class="page">
        <h2>Kesa lga PDF se abtk ka safar 🎀</h2>
    </div>
    <div class="page">
        <h2>Thankuuu mere life mai aane ke liye 💝</h2>
    </div>
    <div class="page">
        <h2>Aapse pyaar hona mera best decision 😭🤭</h2>
    </div>
    <div class="page">
        <h2>I love you Mera Bachaa 😚</h2>
    </div>
    <div class="page">
        <h1>Happy Anniversary 👀🎀</h1>
    </div>

    <button class="next-button" onclick="nextPage()">Next ➡️</button>

    <script>
        const pages = document.querySelectorAll('.page');
        let currentPage = 0;

        function nextPage() {
            pages[currentPage].classList.remove('active');
            currentPage++;
            if(currentPage >= pages.length) currentPage = pages.length - 1;
            pages[currentPage].classList.add('active');
        }
    </script>
</body>
</html>
